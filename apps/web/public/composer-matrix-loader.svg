  <defs>
    <filter id="svg-bloom" x="-100%" y="-100%" width="300%" height="300%">
      <feComponentTransfer in="SourceGraphic" result="bright">
        <feFuncR type="linear" slope="3.30" intercept="-1.32"/>
        <feFuncG type="linear" slope="3.30" intercept="-1.32"/>
        <feFuncB type="linear" slope="3.30" intercept="-1.32"/>
      </feComponentTransfer>
      <feGaussianBlur in="bright" stdDeviation="6.5" result="bloomSmall"/>
      <feGaussianBlur in="bright" stdDeviation="13.0" result="bloomLarge"/>
      <feMerge result="bloomMerge">
        <feMergeNode in="bloomLarge"/>
        <feMergeNode in="bloomSmall"/>
      </feMerge>
      <feBlend in="SourceGraphic" in2="bloomMerge" mode="screen"/>
    </filter>
  </defs>
